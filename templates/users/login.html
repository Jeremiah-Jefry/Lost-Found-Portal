{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login - KG Recovery Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 mt-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted">Sign in to manage your found and lost items.</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Sign In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light border-top-0 py-3">
                <p class="mb-0 text-muted">Don't have an account? <a href="{% url 'register' %}"
                        class="fw-semibold text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
