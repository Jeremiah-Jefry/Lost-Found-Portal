{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Edit {{ item.title }} - KG Recovery Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'item_feed' %}">Items</a></li>
                <li class="breadcrumb-item"><a href="{% url 'item_detail' item.pk %}">{{ item.title|truncatechars:20
                        }}</a></li>
                <li class="breadcrumb-item active" aria-current="page">Edit</li>
            </ol>
        </nav>

        <div class="card shadow border-0 mt-3">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Edit Item Report</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'item_detail' item.pk %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
