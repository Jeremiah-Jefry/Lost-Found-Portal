<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KG Community Recovery Portal{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <!-- Custom Portal CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-body-bg m-0 overflow-hidden">

    <div class="d-flex vh-100" id="wrapper">

        <!-- Sidebar Menu -->
        {% include 'includes/sidebar.html' %}

        <!-- Page Content Wrapper -->
        <div id="page-content-wrapper" class="flex-grow-1 bg-body-bg overflow-auto">

            <!-- Mobile Toggle / Minimal Action Bar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-card-bg border-bottom shadow-sm px-4 py-3 d-flex justify-content-between align-items-center position-sticky top-0 bg-white"
                style="z-index: 1000;">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-secondary d-md-none" id="menu-toggle"><i
                            class="bi bi-list fs-5"></i></button>
                    <h5 class="mb-0 fw-bold text-dark d-none d-md-block">{% block page_title %}{% endblock %}</h5>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <!-- Global Search Placeholder (Could expand into a wider bar) -->
                    <form method="GET" action="{% url 'item_feed' %}" class="d-flex d-none d-sm-flex position-relative">
                        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                        <input
                            class="form-control rounded-pill ps-5 bg-light border-0 shadow-none focus-ring focus-ring-primary"
                            type="search" name="q" placeholder="Search the portal..." aria-label="Search"
                            style="width: 300px;">
                    </form>
                </div>
            </nav>

            <!-- Flash Messages Container -->
            <div class="container-fluid px-4 px-md-5 py-3">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm"
                    role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}
            </div>

            <!-- Main Content Container -->
            <main class="container-fluid px-4 px-md-5 pb-5 flex-grow-1 h-100">
                {% block content %}
                {% endblock %}
            </main>

        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Sidebar Toggle Script -->
    <script>
        document.getElementById("menu-toggle").addEventListener("click", function (e) {
            e.preventDefault();
            document.getElementById("wrapper").classList.toggle("toggled");
        });
    </script>
</body>

</html>
