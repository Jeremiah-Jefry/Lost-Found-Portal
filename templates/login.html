{% extends "base.html" %}
{% block title %}Sign In — KG Recovery Portal{% endblock %}
{% block page_title %}Sign In{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[65vh]">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-lg overflow-hidden">

            <!-- Header -->
            <div class="px-6 md:px-8 pt-8 md:pt-10 pb-5 text-center border-b border-gray-100">
                <div class="w-14 h-14 rounded-2xl bg-brand/10 flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-2xl text-brand"></i>
                </div>
                <h2 class="text-xl md:text-2xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-sm text-gray-400 mt-1">Sign in to manage your campus reports.</p>
            </div>

            <!-- Form -->
            <div class="px-6 md:px-8 py-7">
                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="text" name="username" id="username" required autofocus
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800
                                       placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-100
                                       focus:border-brand transition-all text-sm"
                                placeholder="Enter your username">
                        </div>
                    </div>

                    <div class="mb-6">
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" name="password" id="password" required
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800
                                       placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-100
                                       focus:border-brand transition-all text-sm"
                                placeholder="Enter your password">
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full py-3.5 bg-brand text-white font-semibold rounded-xl hover:bg-brand-dark
                               transition-all shadow-md shadow-blue-200 text-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-right-to-bracket text-sm"></i> Sign In
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="border-t border-gray-100 px-6 md:px-8 py-4 text-center bg-gray-50/50">
                <p class="text-sm text-gray-400">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-brand font-semibold hover:text-brand-dark transition-colors ml-1">
                        Create Account
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
