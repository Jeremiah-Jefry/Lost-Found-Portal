<div class="border-end bg-white shadow-sm" id="sidebar-wrapper">
    <div class="sidebar-heading fs-4 fw-bold text-primary px-4 py-3 border-bottom d-flex align-items-center gap-2">
        <i class="bi bi-box-seam"></i> KG Portal
    </div>
    <div class="list-group list-group-flush mt-3">
        <!-- Main Navigation -->
        <small class="text-uppercase text-muted fw-bold px-4 mb-2 d-block"
            style="font-size: 11px; letter-spacing: 0.5px;">Navigation</small>

        <a href="{% url 'index' %}"
            class="list-group-item list-group-item-action bg-transparent px-4 py-2 border-0 d-flex align-items-center gap-2 {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="{% url 'item_feed' %}"
            class="list-group-item list-group-item-action bg-transparent px-4 py-2 border-0 d-flex align-items-center gap-2 {% if request.resolver_match.url_name == 'item_feed' %}active{% endif %}">
            <i class="bi bi-collection-fill"></i> Community Feed
        </a>

        {% if user.is_authenticated %}
        <small class="text-uppercase text-muted fw-bold px-4 mt-4 mb-2 d-block"
            style="font-size: 11px; letter-spacing: 0.5px;">Manage</small>
        <a href="{% url 'report_item' %}"
            class="list-group-item list-group-item-action bg-transparent px-4 py-2 border-0 d-flex align-items-center gap-2 {% if request.resolver_match.url_name == 'report_item' %}active{% endif %}">
            <i class="bi bi-plus-circle-fill"></i> Report Item
        </a>
        {% endif %}
    </div>

    <!-- User Profile Footer Area -->
    <div class="position-absolute bottom-0 w-100 border-top bg-light p-3">
        {% if user.is_authenticated %}
        <div class="d-flex align-items-center gap-2">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                style="width: 35px; height: 35px; font-size: 14px;">
                {{ user.username|make_list|first|upper }}
            </div>
            <div class="flex-grow-1 text-truncate">
                <h6 class="mb-0 fw-bold text-dark text-truncate" style="font-size: 14px;">{{ user.username }}</h6>
                <small class="text-muted d-block text-truncate" style="font-size: 12px;">{{
                    user.email|default:'Community Member' }}</small>
            </div>
        </div>
        <form method="POST" action="{% url 'logout' %}" class="mt-2 text-center w-100">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-danger w-100 w-100 rounded-pill"><i
                    class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
        {% else %}
        <div class="d-flex flex-column gap-2">
            <a href="{% url 'login' %}" class="btn btn-primary rounded-pill w-100 shadow-sm">Login</a>
            <a href="{% url 'register' %}" class="btn btn-outline-primary rounded-pill w-100">Register</a>
        </div>
        {% endif %}
    </div>
</div>
